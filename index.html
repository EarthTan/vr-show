<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>360° 全景图查看器</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="viewer-canvas"></canvas>

    <div id="empty-state" class="empty-state">
      <div class="empty-state-inner">
        <div class="empty-state-icon">
          <svg viewBox="0 0 64 64" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="32" cy="32" r="28" />
            <ellipse cx="32" cy="32" rx="12" ry="28" />
            <ellipse cx="32" cy="32" rx="22" ry="28" />
            <line x1="4" y1="32" x2="60" y2="32" />
          </svg>
        </div>
        <div class="empty-state-title">拖入一张全景图</div>
        <div class="empty-state-sub">或将图片拖到此处 · 点击选择文件</div>
      </div>
    </div>

    <div id="hud" class="hud">
      <span>拖动旋转 · 滚轮缩放</span>
    </div>

    <div id="error-banner" class="error-banner" role="alert"></div>

    <input id="file-input" type="file" accept="image/*" hidden />

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

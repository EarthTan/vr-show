name: Release

# Build & publish a GitHub Release for `pano-viewer` on every `v*` tag push
# or manual dispatch. Produces native installers for macOS, Windows and
# Linux plus SHA256SUMS.txt and uploads them all to the GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the GitHub Release step (useful for testing the pipeline)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: pano-viewer
  # Override the crate version in CI by reading the git tag (e.g. v0.4.0 → 0.4.0).
  CRATE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.3.0' }}
  CRATE_VERSION_NO_V: ${{ github.ref_type == 'tag' && github.ref_name.startswith('v') && github.ref_name[1:] || github.ref_name }}

jobs:
  # ── Linux (x86_64) ──────────────────────────────────────────────
  # Produces: .deb + .AppImage + .tar.gz
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxkbcommon-dev libwayland-dev libxinerama-dev \
            libegl1-mesa-dev libasound2-dev \
            libfuse2 libfontconfig1

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/pano-viewer -> target

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build & package (release)
        run: |
          cargo packager --release \
            --manifest-path crates/pano-viewer/Cargo.toml \
            --formats deb,appimage \
            -o dist

      - name: Build portable tarball
        run: |
          mkdir -p dist
          cp target/release/$BIN_NAME dist/
          tar -C dist -czf dist/${BIN_NAME}-${CRATE_VERSION_NO_V}-linux-x86_64.tar.gz $BIN_NAME

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/*.tar.gz

  # ── macOS (Apple Silicon + Intel) ───────────────────────────────
  # Produces: arm64 .dmg, x86_64 .dmg, and a universal .dmg + tarballs.
  macos:
    name: macOS
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            suffix: arm64
          - target: x86_64-apple-darwin
            suffix: x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/pano-viewer -> target

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package .dmg + tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          cargo packager --release \
            --manifest-path crates/pano-viewer/Cargo.toml \
            --target ${{ matrix.target }} \
            --formats app \
            -o dist

          APP="dist/Pano Viewer.app"
          if [ ! -d "$APP" ]; then
            APP=$(find dist target -name "Pano Viewer.app" -type d | head -n 1)
          fi
          echo "App bundle: $APP"

          # cargo-packager installs create-dmg from GitHub, which can be flaky
          # on macOS runners. Fall back to the system `hdiutil` to build a UDZO
          # dmg directly from the .app — same format Apple ships.
          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/"
          hdiutil create -volname "Pano Viewer" -srcfolder "$STAGE" -ov \
            -format UDZO \
            "dist/${BIN_NAME}-${CRATE_VERSION_NO_V}-macos-${{ matrix.suffix }}.dmg"
          rm -rf "$STAGE"

          tar -C target/${{ matrix.target }}/release -czf \
            dist/${BIN_NAME}-${CRATE_VERSION_NO_V}-macos-${{ matrix.suffix }}.tar.gz \
            $BIN_NAME

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.suffix }}
          path: |
            dist/*.dmg
            dist/*.tar.gz

  # ── macOS Universal (single .dmg that runs on both architectures) ─
  macos-universal:
    name: macOS Universal (.dmg)
    runs-on: macos-latest
    needs: macos
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/pano-viewer -> target

      - name: Build universal binary
        run: |
          cargo build --release --target universal2-apple-darwin
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/$BIN_NAME \
            target/x86_64-apple-darwin/release/$BIN_NAME \
            -output dist/$BIN_NAME
          # Wrap into a minimal .app bundle for distribution.
          APP=dist/Pano\ Viewer.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/$BIN_NAME "$APP/Contents/MacOS/$BIN_NAME"
          cp crates/pano-viewer/icons/icon.icns "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Pano Viewer</string>
            <key>CFBundleDisplayName</key><string>Pano Viewer</string>
            <key>CFBundleExecutable</key><string>${BIN_NAME}</string>
            <key>CFBundleIdentifier</key><string>com.github.earthtan.panoviewer</string>
            <key>CFBundleVersion</key><string>${CRATE_VERSION_NO_V}</string>
            <key>CFBundleShortVersionString</key><string>${CRATE_VERSION_NO_V}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>CFBundleSignature</key><string>????</string>
          </dict>
          </plist>
          EOF
          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/"
          hdiutil create -volname "Pano Viewer" -srcfolder "$STAGE" -ov \
            -format UDZO \
            "dist/${BIN_NAME}-${CRATE_VERSION_NO_V}-macos-universal.dmg"
          rm -rf "$STAGE"

      - name: Upload universal .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/*.dmg

  # ── Windows (x86_64) ────────────────────────────────────────────
  # Produces: NSIS .exe installer + portable .zip
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/pano-viewer -> target

      - name: Install NSIS (for the .exe installer)
        run: choco install nsis -y

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package NSIS installer
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          cargo packager --release `
            --manifest-path crates/pano-viewer/Cargo.toml `
            --target x86_64-pc-windows-msvc `
            --formats nsis `
            -o dist
          Get-ChildItem -Path target/x86_64-pc-windows-msvc/release/*.exe |
            Where-Object { $_.Name -notmatch '^cargo-' } |
            Copy-Item -Destination dist/

      - name: Package portable .zip
        run: |
          Compress-Archive `
            -Path target/x86_64-pc-windows-msvc/release/${env:BIN_NAME}.exe `
            -DestinationPath dist/${env:BIN_NAME}-${env:CRATE_VERSION_NO_V}-windows-x86_64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist/*.exe
            dist/*.zip

  # ── Compute SHA256 checksums and create the GitHub Release ─────
  release:
    name: Publish GitHub Release
    needs: [linux, macos, macos-universal, windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: artifacts
        run: |
          set -euo pipefail
          for f in *; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
